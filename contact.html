        }

        .contact-header {

            color: white;
            padding: 80px 0;
            text-align: center;
        }

        .footer-link {
            color: #ccc;
            text-decoration: none;
        }

        .footer-link:hover {
            color: white;
        }

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <img src="Images/logo-.png" width="50" height="50" class="me-2" />
                Akz IT Solutions
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">

    </div>

            <div class="row justify-content-center">
                <div class="col-md-6">
                    <form id="contactForm">
                        <input type="text" class="form-control mb-3" placeholder="Your Name" required>
                        <input type="email" class="form-control mb-3" placeholder="Email" required>

                        <button class="btn btn-dark w-100">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-black text-white pt-5 pb-3">

                <div class="col-md-4 mb-4">
